<!DOCTYPE html>
<html lang="uk">
  <head>
    <title>ClockWork</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="style1.css">
    <style>
      * {
      box-sizing: border-box;
      }
    
      body {
        font-family: 'Courier New', monospace;
      }
      
      header {
        display: grid;
        background-color: #C34639;
        padding: 40px;
        text-align: center;
        place-items: center;
        font-size: 3vw;
        color: white;
      }

      nav{
        background-color: #DF8460;
        font-weight: bold;
      }
      
      nav a{
        color:white;
      }
      
      article {
        float: left;
        padding: 20px;
        width: 100%;
        background-color: #E3D5CA;
    
      }
      
      footer {
        background-color: #C34639;
        padding: 30px;
        text-align: center;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      label{
        font-weight: bold;
        color: #6A261F;
      }

      .caption_page{
        text-align:center;
        color:#080c3a;
      }
      
      .but_1{
        background-color:#C34639;
        border-color: #6A261F;
        color:white;
        display: block;
        margin: 0 auto;
      }

      .reg_log_a{
        display: block;
        text-align: center;
        color: #080c3a;
      }

      .main_head{
        text-align: center;
        color:white;
        font-size: 200%;
      }

      .font_all{
        color:#A53C30;
      }

      .font_all_white{
        color:white;
      }

      .reg_vers_artc{
        float: left;
        padding: 20px;
        width: 100%;
        background-color: #E3D5CA;
        height: 800px;
      }

      .artc_prf{
        float: right;
        padding: 20px;
        width: 100%;
        height: 1000px;
        background-color: #E3D5CA;
      }

      .img1{
        border: 2px solid #6A261F; 
        border-radius: 5px; 
        display: block;
      }

      .timer_pos{
        display: flex;
        justify-content: center;
        align-items: center;

      }

      .circle_wrapper {
        display: inline-block;
      }

      .circle_type{
        width: 17vw;
        height: 17vw;
        margin: 1vw;
        background-color: #E3D5CA;
        border-color: #A53C30;
        border:1vw solid #A53C30;
        border-radius: 50%; 
        display: flex; 
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 24px;
      }


      .circle_t1{
        display: block;
        text-align: center;
        font-size: 3vw;
        color:#A53C30;
        font-weight: bold;
      }

      .time_block{
        width:11vw;
        height:10vw;
        color:#A53C30;
        border: none;
        outline: none;
        font-size: 7vw;
        display: flex; 
        background-color: #E3D5CA;
        justify-content: center;
        align-items: center;
      }

      .but_orgn{
        display: flex;
      }

      .footer_link{
        display: flex;
        justify-content: center;
      }

      .block_text{
        color:#6A261F;
      }
      
  </style>
  </head>
  <body>
    <header>
      <div class="block1">
        <h2 class="main_head"><i>Облік робочого часу</i></h2>
      </div>
    </header>
    
    <nav class="nav font_all_white">
        <a class="nav-link" href="user_registration.html" style="color: white;">Реєстрація</a>
        <a class="nav-link" href="login_in.html" style="color: white;">Вхід</a>
        <a class="nav-link" href="profile.html" style="color: white;">Профіль</a>
        <a class="nav-link" href="about_app.html" style="color: white;">Про додаток</a>
    </nav>

    <article>
      <div class="timer_pos">
        <form>
          <div class="circle_wrapper">
            <div class="circle_type">
                <input type="number" name="hour" min="0" class="time_block">
            </div>
            <h3 class="circle_t1 font_all">Години</h3>
          </div>
          <div class="circle_wrapper">
            <div class="circle_type">
              <input type="number" name="minute" min="0" max="60" class="time_block">
            </div>
            <h3 class="circle_t1 font_all">Хвилини</h3>
          </div>
          <div class="circle_wrapper">
            <div class="circle_type">
              <input type="number" name="seconds" min="0" max="60" class="time_block">
            </div>
            <h3 class="circle_t1 font_all">Секунди</h3>
          </div>
          <br><br>
          <div>
            <label for="nameTimer" class="form-label font_all">Назва задачі:</label>
            <input type="text" class="form-control" aria-describedby="NameTimer"><br>
            <button type="submit" class="btn btn-primary but_1">Зберегти</button><br><br>
            <label for="nameTimer" class="form-label font_all">Час початку таймера:</label>
            <input type="datetime-local" name="start_time" class="form-label font_all"><br>
            <label for="nameTimer" class="form-label font_all">Час кінця таймера:</label>
            <input type="datetime-local" name="finish_time" class="form-label font_all">
          </div>
          <br><br>
          <div class="but_orgn">
            <button type="submit" class="btn btn-primary but_1">Запустити</button><br>
            <button class="btn btn-primary but_1">Призупинити/продовжити</button><br>
            <button class="btn btn-primary but_1">Зупинити</button><br>
          </div><br><br>
          
        </form>
        
      </div> 
    </article>
 

    <footer>
      <div cass="footer_link">
          <a class="nav-link" href="user_registration.html" style="color: white;">Реєстрація</a>
          <a class="nav-link" href="login_in.html" style="color: white;">Вхід</a> 
          <a class="nav-link" href="profile.html" style="color: white;">Профіль</a>
          <a class="nav-link" href="about_app.html" style="color: white;">Про додаток</a>
          <a class="nav-link" href="work_page.html" style="color: white;">Облік робочого часу</a>
      </div>
    </footer>

  </body>
</html>
